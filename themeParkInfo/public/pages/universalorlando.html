  <!-- =========================
       Universal Studios Fl
  ========================== -->
   <div class="park-content active" id="usfl">
    <div class="parkContainer">

      <!-- SUB TABS -->
      <div class="sub-tabs">
        <button class="sub-tab active" data-type="rides">Rides</button>
        <button class="sub-tab" data-type="shows">Shows</button>
      </div>

      <!-- CARD WRAPPERS -->
      <div class="card-wrapper usfl-attractions active" data-type="rides">
      <div class="controls-wrapper">
        <div class="search-wrapper">
          <i class="fa fa-search"></i>
          <input type="text" class="card-search" placeholder="Search rides..." />
        </div>

        <div class="sort-wrapper">
          <select class="card-sort">
            <option value="default">Sort</option> 
            <option value="name">Sort by: Name (A-Z)</option>
            <option value="waitTime">Sort by: Wait Time (Low-High)</option>
            <option value="status">Sort by: Status (Open First)</option>
          </select>
        </div>
      </div>
        <div class="card-list"></div>
      </div>

      <div class="card-wrapper usfl-shows" data-type="shows">
