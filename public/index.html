<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adventure Scout</title>
  <link rel="stylesheet" href="assets/css/site-theme.css" />
  <link rel="stylesheet" href="assets/css/navigation.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

</head>
<body>

  <!-- Placeholders for injected content -->
  <div id="header-placeholder"></div>
  <div id="nav-placeholder"></div>



<section class="quick-actions">
  <button>🎢 Rides</button>
  <button>🎭 Shows</button>
  <button>🍔 Dining</button>
  <button>🗺 Map</button>
</section>

<section class="featured">
  <h2>Popular Right Now</h2>
  <div class="featured-card">

    <h3>Seven Dwarfs Mine Train</h3>
    <p>Wait Time</p>
    <strong>85 min</strong>
  </div>
</section>

<section class="attractions">
  <h2>All Attractions</h2>

  <div class="attraction-card">
    <div>
      <h3>Pirates of the Caribbean</h3>
      <p>Adventure</p>
    </div>
    <span class="wait low">15 min</span>
  </div>

  <div class="attraction-card">
    <div>
      <h3>Space Mountain</h3>
      <p>Thrill</p>
    </div>
    <span class="wait high">70 min</span>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="assets/js/navigation.js"></script>
<script src="../assets/js/apiBase.js"></script>

</html>
