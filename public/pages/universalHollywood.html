<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adventure Scout -  Universal Studios - Orlando</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"> 
  <link rel="stylesheet" href="../assets/css/site-theme.css" />
  <link rel="stylesheet" href="../assets/css/navigation.css" />
  <link rel="stylesheet" href="../assets/css/tabs.css"> 
  <link rel="stylesheet" href="../assets/css/parkHours.css"> 
  <link rel="stylesheet" href="../assets/css/cards.css"> 
  <link rel="stylesheet" href="../assets/css/alertModal.css"> 
  <link rel="stylesheet" href="../assets/css/icons.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
</head>

<body>
  <!-- Placeholders for injected content -->
  <div id="header-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- =========================
       PARK TABS
  ========================== -->
  <div class="park-tabs">
    <button class="park-tab active" data-park="usHollywood">Universal Studios Hollywood</button>
  </div>

<div class="park-hours-container">
  <div class="park-hours-left">
    <div class="park-hours-text">
      <div class="hours-title">Park Hours</div>
      <div class="hours-details">
        <span class="open-hours"></span>
      </div>
    </div>
  </div>
</div>
  <!-- =========================
       Universal Studios Fl
  ========================== -->
   <div class="park-content active" id="usHollywood">
    <div class="parkContainer">

      <!-- SUB TABS -->
      <div class="sub-tabs">
        <button class="sub-tab active" data-type="rides"><i class="fa fa-ticket rides-icon"></i><span>Rides</span></button>
        <button class="sub-tab" data-type="shows"><i class="fa fa-calendar-check-o shows-icon"></i><span>Shows</span></button>
      </div>

      <!-- CARD WRAPPERS -->
      <div class="card-wrapper usHollywood-attractions active" data-type="rides">
      <div class="controls-wrapper">
        <div class="search-wrapper">
          <i class="fa fa-search"></i>
          <input type="text" class="card-search" placeholder="Search rides..." />
        </div>

        <div class="sort-wrapper">
          <select class="card-sort">
            <option value="default">Sort</option> 
            <option value="name">Sort by: Name (A-Z)</option>
            <option value="waitTime">Sort by: Wait Time (Low-High)</option>
            <option value="status">Sort by: Status (Open First)</option>
          </select>
        </div>
      </div>
        <div class="card-list"></div>
      </div>

      <div class="card-wrapper usHollywood-shows" data-type="shows">
      <div class="controls-wrapper">
        <div class="search-wrapper">
          <i class="fa fa-search"></i>
          <input type="text" class="card-search" placeholder="Search shows..." />
        </div>

        <div class="sort-wrapper">
          <select class="card-sort">
            <option value="default">Sort</option> 
            <option value="name">Sort by: Name (A-Z)</option>
            <option value="waitTime">Sort by: Wait Time (Low-High)</option>
            <option value="status">Sort by: Status (Open First)</option>
          </select>
        </div>
      </div>
        <div class="card-list"></div>
      </div>
    </div>
  </div>
  
    <!-- =========================
       Modal
  ========================== -->
  <div class="waitTimeAlertModal" aria-hidden="true"></div>
  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS
  ========================== -->
<script src="../assets/js/apiBase.js"></script>
<script src="../assets/js/usHollywood-initial-setup.js"></script>
<script src="../assets/js/waittimes.js"></script>
<script src="../assets/js/alertbtn.js"></script>
<script src="../assets/js/parkHours.js"></script>
<script src="../assets/js/parkTabs.js"></script>
<script src="../assets/js/cardsortsearch.js"></script>
<script src="../assets/js/filterTables.js"></script>
<script src="../assets/js/navigation.js"></script>

</body>
</html>
