<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adventure Scout - Alert Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="stylesheet" href="../assets/css/site-theme.css" />
  <link rel="stylesheet" href="../assets/css/navigation.css" />
  <link rel="stylesheet" href="../assets/css/alertsManager.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="alerts-page">
    <section class="alerts-hero">
      <h2>Your Wait Time Alerts</h2>
      <p>See the ride alerts you already set, change the minutes if you want, or remove any alert you no longer need.</p>
      <div class="alerts-hero-actions">
        <a class="alerts-hero-link" href="/pages/reservation-alerts.html">Restaurant Reservation Alerts</a>
      </div>
    </section>

    <section class="alerts-toolbar">
      <button id="refreshAlertsBtn" type="button">
        <i class="fa fa-refresh"></i> Refresh Alerts
      </button>
      <div class="alerts-status" id="alertsStatus">Loading alerts...</div>
    </section>

    <section class="alerts-list" id="alertsList"></section>
  </main>

  <div class="alerts-confirm-modal" id="deleteAlertModal" aria-hidden="true">
    <div class="alerts-confirm-dialog">
      <h3>Delete Alert</h3>
      <p id="deleteAlertText"></p>
      <div class="alerts-confirm-actions">
        <button class="alerts-confirm-btn cancel" id="cancelDeleteAlertBtn" type="button">Cancel</button>
        <button class="alerts-confirm-btn delete" id="confirmDeleteAlertBtn" type="button">Delete</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/apiBase.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script src="../assets/js/alertsManager.js"></script>
</body>
</html>
