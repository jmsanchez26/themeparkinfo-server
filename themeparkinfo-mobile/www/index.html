<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adventure Scout</title>
  <link rel="stylesheet" href="assets/css/site-theme.css" />
  <link rel="stylesheet" href="assets/css/navigation.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="nav-placeholder"></div>

  <section class="quick-actions">
    <button><i class="fa fa-ticket"></i> Lowest Waits</button>
    <button><i class="fa fa-calendar"></i> Parades</button>
    <button><i class="fa fa-bell"></i> Alerts</button>
    <button><i class="fa fa-map-marker"></i> Parks</button>
  </section>

  <section class="featured">
    <h2>Lowest Wait Right Now</h2>
    <div class="featured-card" id="featuredRideCard">
      <span class="tag">Loading live data</span>
      <h3>Finding the shortest wait</h3>
      <p>Checking all parks now</p>
      <strong>...</strong>
    </div>
  </section>

  <section class="attractions">
    <h2>Lowest Waits Across Parks</h2>
    <div id="lowestWaitsList">
      <div class="attraction-card">
        <div>
          <h3>Loading rides...</h3>
          <p>Pulling current waits from all parks</p>
        </div>
        <span class="wait">...</span>
      </div>
    </div>
  </section>

  <section class="events">
    <h2>Next Parades & Big Shows</h2>
    <div id="paradeEventsList">
      <div class="event-card">
        <div>
          <h3>Loading events...</h3>
          <p>Checking upcoming parade times</p>
        </div>
        <span class="event-time">...</span>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="../assets/js/apiBase.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/homepage.js"></script>
</body>
</html>
